<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SkillHood</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue your skill exchange journey</p>
            
            <div id="error-message" class="alert alert-error" style="display: none;"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary btn-full" id="login-btn">
                    <span id="btn-text">Sign In</span>
                    <span id="btn-loader" class="loading-spinner" style="display: none;"></span>
                </button>
                
                <div style="text-align: center; margin: 1.5rem 0; color: var(--text-secondary); font-size: 0.9rem;">or</div>
                
                <button type="button" class="btn-secondary btn-full" onclick="signInWithGoogle()">
                    <span style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                        <span>🔍</span> Sign in with Google
                    </span>
                </button>
            </form>
            
            <div class="auth-links">
                <a href="forgot-password.html">Forgot password?</a>
                <a href="register.html">Create account</a>
            </div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ui-utils.js"></script>
    <script src="auth-real.js"></script>
</body>
</html>
