<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SkillHood</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Reset Password</h1>
            <p class="auth-subtitle">Enter your email to receive a reset link</p>
            
            <div id="success-message" class="alert alert-success" style="display: none;"></div>
            <div id="error-message" class="alert alert-error" style="display: none;"></div>
            
            <form id="forgot-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email-input" class="form-input" placeholder="your@email.com" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary btn-full" id="send-otp-btn">
                    <span id="btn-text">Send Reset Link</span>
                    <span id="btn-loader" class="loading-spinner" style="display: none;"></span>
                </button>
            </form>
            
            <div id="otp-section" style="display: none; margin-top: 1.5rem;">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="new-password" class="form-input" placeholder="Min. 8 chars (A-z, 0-9)" minlength="8">
                    </div>
                    <small style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 0.25rem; display: block;">
                        Must include: uppercase, lowercase, and number
                    </small>
                </div>
                
                <button class="btn-primary btn-full" onclick="resetPassword()">Reset Password</button>
            </div>
            
            <div class="auth-links">
                <a href="login.html">Back to login</a>
            </div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ui-utils.js"></script>
    <script>
        let resetToken = null;
        
        document.getElementById('forgot-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('send-otp-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const email = document.getElementById('email-input').value;
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';
            btn.disabled = true;
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${window.APP_CONFIG.API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resetToken = data.resetUrl.split('token=')[1];
                    successDiv.textContent = 'Reset link sent! Check your email or use the form below.';
                    successDiv.style.display = 'block';
                    document.getElementById('otp-section').style.display = 'block';
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Failed to send reset link';
                errorDiv.style.display = 'block';
            }
            
            btnText.style.display = 'inline';
            btnLoader.style.display = 'none';
            btn.disabled = false;
        });
        
        async function resetPassword() {
            const password = document.getElementById('new-password').value;
            const errorDiv = document.getElementById('error-message');
            
            if (!resetToken) {
                errorDiv.textContent = 'Please request a reset link first';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 8) {
                errorDiv.textContent = 'Password must be at least 8 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`${window.APP_CONFIG.API_URL}/auth/reset-password/${resetToken}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    UI.toast('Password reset successful!', 'success');
                    setTimeout(() => window.location.href = 'login.html', 1000);
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Failed to reset password';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
